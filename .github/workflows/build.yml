---
name: Build Docker Image

on:
  push:
    branches:
      - main
      - feature*
  workflow_dispatch:

env:
  IMAGE_NAME: mortcal

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.create_sha.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create SHA Tag
        id: create_sha
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT ; echo $GITHUB_OUTPUT >> image-tag.txt

      - name: Build & Push Docker Image
        run: |
          docker build -t tiggy081/$IMAGE_NAME:${{ steps.create_sha.outputs.tag }} .
          docker push tiggy081/$IMAGE_NAME:${{ steps.create_sha.outputs.tag }}

      - name: Upload Image Tag
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt
